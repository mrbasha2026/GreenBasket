<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002868;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3f8f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background hexagon shape -->
  <polygon points="100,8 175,45 175,130 100,167 25,130 25,45" fill="url(#blueGrad)" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Inner decorative hexagons -->
  <polygon points="100,22 162,52 162,122 100,152 38,122 38,52" fill="none" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
  <polygon points="100,35 150,58 150,115 100,138 50,115 50,58" fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="0.5"/>
  
  <!-- Trophy silhouette -->
  <g transform="translate(100,85)">
    <!-- Trophy cup -->
    <path d="M-18,-35 L-20,-15 C-20,-5 -12,5 0,8 C12,5 20,-5 20,-15 L18,-35 Z" fill="url(#goldGrad)"/>
    <!-- Trophy handles -->
    <path d="M-18,-25 C-30,-25 -32,-10 -22,-5 L-20,-8" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M18,-25 C30,-25 32,-10 22,-5 L20,-8" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Trophy stem -->
    <rect x="-4" y="8" width="8" height="12" fill="#FFD700" rx="1"/>
    <!-- Trophy base -->
    <rect x="-14" y="20" width="28" height="5" fill="#FFD700" rx="2"/>
    <rect x="-10" y="25" width="20" height="3" fill="#FFD700" rx="1"/>
  </g>
  
  <!-- Text "FIFA WORLD CUP" above -->
  <text x="100" y="55" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" letter-spacing="2">FIFA WORLD CUP</text>
  
  <!-- Number "26" prominently -->
  <text x="100" y="150" text-anchor="middle" fill="url(#goldGrad)" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" letter-spacing="2">26</text>
  
  <!-- Small colored dots representing host nations -->
  <circle cx="60" cy="163" r="4" fill="#E31837"/>
  <circle cx="100" cy="166" r="4" fill="#00A651"/>
  <circle cx="140" cy="163" r="4" fill="#FFD700"/>
  
  <!-- Host nations text -->
  <text x="100" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="7" letter-spacing="1">USA · MEXICO · CANADA</text>
  
  <!-- Year -->
  <text x="100" y="195" text-anchor="middle" fill="#FFD700" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">2026</text>
  
  <!-- Bottom decorative line -->
  <line x1="55" y1="202" x2="145" y2="202" stroke="rgba(255,215,0,0.4)" stroke-width="0.5"/>
  
  <!-- Small geometric accents -->
  <rect x="30" y="210" width="6" height="6" fill="#002868" transform="rotate(45,33,213)"/>
  <rect x="96" y="212" width="8" height="8" fill="#E31837" transform="rotate(45,100,216)"/>
  <rect x="162" y="210" width="6" height="6" fill="#00A651" transform="rotate(45,165,213)"/>
  
  <!-- Outer glow ring -->
  <circle cx="100" cy="85" r="55" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="20"/>
</svg>