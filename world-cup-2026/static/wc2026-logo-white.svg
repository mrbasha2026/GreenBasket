<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="gd2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFEC8B"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="120" cy="120" r="115" fill="none" stroke="url(#gd)" stroke-width="2.5" opacity="0.6"/>
  <circle cx="120" cy="120" r="108" fill="none" stroke="url(#gd)" stroke-width="1" opacity="0.3"/>
  <!-- FIFA text -->
  <text x="120" y="48" text-anchor="middle" fill="url(#gd2)" font-size="18" font-weight="bold" font-family="Arial, sans-serif" letter-spacing="4" filter="url(#glow)">FIFA</text>
  <!-- WORLD CUP text -->
  <text x="120" y="72" text-anchor="middle" fill="white" font-size="14" font-family="Arial, sans-serif" letter-spacing="3" opacity="0.95">WORLD CUP</text>
  <!-- Big 26 -->
  <text x="120" y="132" text-anchor="middle" fill="url(#gd2)" font-size="72" font-weight="bold" font-family="Arial, sans-serif" filter="url(#glow)">26</text>
  <!-- TM -->
  <text x="175" y="82" fill="url(#gd)" font-size="9" font-family="Arial, sans-serif" opacity="0.7">™</text>
  <!-- Trophy -->
  <g transform="translate(85, 145)">
    <path d="M14 0 L46 0 L46 10 C46 26 34 36 30 40 L30 58 L30 60 L14 60 L14 58 L14 40 C10 36 -2 26 -2 10 L-2 0 Z" fill="url(#gd)" opacity="0.85"/>
    <rect x="12" y="60" width="28" height="6" rx="2" fill="url(#gd)" opacity="0.7"/>
    <rect x="6" y="66" width="40" height="6" rx="2" fill="url(#gd)" opacity="0.5"/>
    <path d="M-2 10 C-16 10 -22 20 -16 30 C-13 34 -2 34 -2 26" fill="none" stroke="url(#gd)" stroke-width="2.5" opacity="0.5"/>
    <path d="M46 10 C60 10 66 20 60 30 C57 34 46 34 46 26" fill="none" stroke="url(#gd)" stroke-width="2.5" opacity="0.5"/>
    <!-- Star on trophy -->
    <polygon points="22,14 24,20 30,20 25,24 27,30 22,26 17,30 19,24 14,20 20,20" fill="#001B44" opacity="0.5"/>
  </g>
  <!-- Host countries -->
  <text x="120" y="232" text-anchor="middle" fill="white" font-size="11" font-family="Arial, sans-serif" opacity="0.85">UNITED STATES</text>
  <text x="120" y="250" text-anchor="middle" fill="white" font-size="11" font-family="Arial, sans-serif" opacity="0.85">MEXICO • CANADA</text>
  <!-- Decorative dots -->
  <circle cx="45" cy="268" r="2.5" fill="url(#gd)" opacity="0.4"/>
  <circle cx="70" cy="271" r="2.5" fill="url(#gd)" opacity="0.4"/>
  <circle cx="95" cy="273" r="2.5" fill="url(#gd)" opacity="0.4"/>
  <circle cx="120" cy="274" r="2.5" fill="url(#gd)" opacity="0.4"/>
  <circle cx="145" cy="273" r="2.5" fill="url(#gd)" opacity="0.4"/>
  <circle cx="170" cy="271" r="2.5" fill="url(#gd)" opacity="0.4"/>
  <circle cx="195" cy="268" r="2.5" fill="url(#gd)" opacity="0.4"/>
</svg>